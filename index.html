<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Arcade Neon</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="particles"></canvas>

    <div class="top-controls">
        <button id="themeToggleBtn" class="icon-btn">Toggle Theme</button>
    </div>

    <!-- 1. Landing Screen -->
    <div id="landing-screen" class="screen active">
        <h1 class="neon-text title-anim">PAC-MAN</h1>
        <div class="input-group">
            <input type="text" id="player-name" placeholder="ENTER NAME" maxlength="10">
        </div>
        <button id="btn-to-difficulty" class="neon-btn">START GAME</button>
        <button id="btn-leaderboard" class="neon-btn alt">LEADERBOARD</button>
    </div>

    <!-- 2. Difficulty Selection Screen -->
    <div id="difficulty-screen" class="screen">
        <h2 class="neon-text">SELECT DIFFICULTY</h2>
        <button class="neon-btn difficulty-btn" data-diff="easy">EASY (Random)</button>
        <button class="neon-btn difficulty-btn mt-2" data-diff="normal">NORMAL (Balanced)</button>
        <button class="neon-btn difficulty-btn mt-2" data-diff="hard">HARD (A* Pathfinding)</button>
        <button id="btn-back-landing" class="neon-btn alt mt-4">BACK</button>
    </div>

    <!-- 3. Leaderboard Screen -->
    <div id="leaderboard-screen" class="screen">
        <h2 class="neon-text">TOP SCORES</h2>
        <div id="leaderboard-list">
            <!-- Populated via JS -->
        </div>
        <button id="btn-back-from-lb" class="neon-btn alt mt-4">BACK</button>
    </div>

    <!-- 4. Game Screen -->
    <div id="game-screen" class="screen">
        <div class="header">
            <div>SCORE: <span id="score" class="score-val">0</span></div>
            <div>LEVEL: <span id="level" class="score-val">1</span></div>
            <div>LIVES: <span id="lives" class="score-val">3</span></div>
        </div>

        <div id="game-container">
            <!-- Game Canvas -->
            <canvas id="gameCanvas" width="630" height="630"></canvas>

            <!-- Status Overlays -->
            <div id="messageOverlay" class="ui-layer hidden">
                <h2 id="messageTitle" class="neon-text">READY!</h2>
            </div>

            <div id="gameOverOverlay" class="ui-layer hidden">
                <h1 class="neon-text">GAME OVER</h1>
                <p>FINAL SCORE: <span id="finalScore" class="score-val">0</span></p>
                <button id="restartBtn" class="neon-btn">PLAY AGAIN</button>
                <button id="menuBtn" class="neon-btn alt mt-2">MAIN MENU</button>
            </div>

            <div id="pauseOverlay" class="ui-layer hidden">
                <h1 class="neon-text">PAUSED</h1>
                <p>Press 'P' or 'ESC' to resume</p>
                <button id="resumeBtn" class="neon-btn">RESUME</button>
                <button id="quitBtn" class="neon-btn alt mt-2">QUIT</button>
            </div>
        </div>

        <!-- Mobile Controls D-Pad -->
        <div class="mobile-controls" id="mobileControls">
            <div class="control-btn btn-up" id="btnUp">▲</div>
            <div class="control-btn btn-left" id="btnLeft">◀</div>
            <div class="control-btn btn-down" id="btnDown">▼</div>
            <div class="control-btn btn-right" id="btnRight">▶</div>
        </div>
    </div>

    <!-- Toast Notification Container for Achievements -->
    <div id="toast-container"></div>

    <!-- Main Application Entry point -->
    <script type="module" src="src/gameEngine.js"></script>
</body>

</html>
